<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Misbah | AI Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    background:linear-gradient(135deg,#020024,#090979,#000);
    color:white;
    overflow-x:hidden;
}

/* animated gradient */
body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:cyan;
    filter:blur(180px);
    top:-100px;
    left:-100px;
    animation:move 8s infinite alternate;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:purple;
    filter:blur(180px);
    bottom:-100px;
    right:-100px;
    animation:move 10s infinite alternate;
}

@keyframes move{
    0%{transform:translate(0,0);}
    100%{transform:translate(120px,120px);}
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    backdrop-filter:blur(15px);
    position:sticky;
    top:0;
}

nav h1{
    color:cyan;
    text-shadow:0 0 10px cyan;
}

nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    transition:0.3s;
}

nav a:hover{
    color:cyan;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:70px;
    background:linear-gradient(90deg,cyan,purple,pink);
    -webkit-background-clip:text;
    color:transparent;
}

.hero p{
    margin-top:10px;
    color:#aaa;
    font-size:20px;
}

/* button */
.btn{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:cyan;
    color:black;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 20px cyan;
}

.btn:hover{
    background:purple;
    color:white;
    box-shadow:0 0 25px purple;
}

/* sections */
section{
    padding:70px;
    text-align:center;
}

.section-title{
    font-size:30px;
    margin-bottom:20px;
}

/* cards grid */
.grid{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    width:250px;
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 25px cyan;
}

/* footer */
footer{
    padding:30px;
    text-align:center;
    color:#aaa;
}
</style>

</head>

<body>

<nav>
    <h1>MISBAH</h1>
    <div>
        <a href="#">Home</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<div class="hero">
    <h1>MISBAH</h1>
    <p>Future AI Web Developer 🚀</p>
    <button class="btn">Explore</button>
</div>

<section id="skills">
    <h2 class="section-title">Skills</h2>
    <div class="grid">
        <div class="card">HTML</div>
        <div class="card">CSS</div>
        <div class="card">JavaScript</div>
        <div class="card">AI Web Design</div>
    </div>
</section>

<section id="projects">
    <h2 class="section-title">Projects</h2>
    <div class="grid">
        <div class="card">AI Portfolio</div>
        <div class="card">Calculator App</div>
        <div class="card">Landing Page</div>
    </div>
</section>

<section id="contact">
    <h2 class="section-title">Contact</h2>
    <div class="card">📧 misbahtahir748@email.com</div>
</section>

<footer>
    © 2026 Misbah | AI Portfolio
</footer>

</body>
</html>
